<title>Психологическая поддержка</title>
<style>

    text-align: center;

    margin: 25px 0;

    text-align: center;

    background: var(--dark-green);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 30px;
    font-size: 1rem;
    cursor: pointer;

    margin: 20px 0;

  .progress-fill {

    margin: 30px 0 20px;
    text-align: center;
    font-weight: 500;

  .options {

    font-size: 1rem;
    font-family: inherit;
    color: var(--text-color);

    border-color: var(--brown);

  .result-text {

    border-radius: 20px;
    padding: 25px;
    margin: 20px 0;

    line-height: 1.8;
    border: 1px dashed #C0B090;

  .footer {
    margin-top: 40px;
    text-align: center;
    font-size: 0.8rem;
    color: #A09080;

// Логика приложения
let currentQuestionId = 'S1';
let stepCount = 0;
const MAX_STEPS = 10; // примерное число шагов для прогресса

function renderTopics() {
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '';
  topics.forEach(topic => {
    const card = document.createElement('div');
    card.className = 'card' + (topic.active ? '' : ' disabled');
    card.textContent = topic.name;
    if (topic.active) {
      card.addEventListener('click', () => {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('test-screen').classList.remove('hidden');
        stepCount = 0;
        updateProgress();
        showQuestion('S1');
      });
    }
    grid.appendChild(card);
  });
}

function updateProgress() {
  const percent = Math.min(100, (stepCount / MAX_STEPS) * 100);
  document.getElementById('progress-fill').style.width = percent + '%';
}

function showQuestion(id) {
  currentQuestionId = id;
  const q = questions[id];
  if (!q) {
    showResult(id);
    return;
  }
  document.getElementById('question-text').textContent = q.text;
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.addEventListener('click', () => handleAnswer(opt.next));
    container.appendChild(btn);
  });
}

function handleAnswer(nextId) {
  stepCount++;
  updateProgress();
  if (nextId === 'STOP_SAFETY') {
    showResult('STOP_SAFETY');
  } else if (nextId.startsWith('RES_')) {
    showResult(nextId);
  } else {
    showQuestion(nextId);
  }
}

function showResult(resultId) {
  document.getElementById('test-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');
  document.getElementById('progress-fill').style.width = '100%';
  const content = document.getElementById('result-content');
  if (resultId === 'STOP_SAFETY') {
    content.textContent = results.STOP_SAFETY;
    return;
  }
  const data = results[resultId];
  if (!data) {
    content.textContent = 'Твоя история уникальна. Мы готовим для тебя персонализированное заключение.';
    return;
  }
  const resultText = `🌱 ${data.title}

🧠 Психологический портрет
${data.portrait}

📊 Анализ текущего состояния
${data.state}

💌 Рекомендации
${data.recommendation}

Помни: ты не один(на). Береги себя.`;
  content.textContent = resultText;
}

// Запуск
renderTopics();
